# Subagent Role Catalog — nase workspace
# Skills reference role names (e.g., "role: lookup") instead of hardcoding models.
# To change model routing, edit this file — all skills pick up the change.
#
# Usage in skills:
#   "Spawn a **lookup** agent to scan the repo structure."
#   → AI reads this file, maps lookup → haiku, includes prompt_prefix
#
# Usage in main conversation:
#   Agent(model="haiku", prompt="This is a simple lookup — keep reasoning minimal. ...")
#
# Each role also declares an `effort:` tier (low|medium|high) — the reasoning
# budget to pass with the model. Apply the Effort scaling rule below to size
# effort to the actual task, not just the role.

roles:
  lookup:
    model: haiku
    effort: low
    tools: [Read, Grep, Glob, Bash]   # Bash for readonly probes (git log, ls, gh api); no Edit/Write
    description: Fast data gathering, simple lookups, grep/glob scans
    prompt_prefix: "This is a simple lookup — keep reasoning minimal."
    use_when:
      - Log/git analysis, file listing, grep/glob searches
      - Doctor checks, tech-digest source fetching
      - Onboard structure scans, stats collection
      - Any task where the answer is in the output, not in reasoning

  worker:
    model: sonnet
    effort: medium
    tools: [Read, Edit, Write, Grep, Glob, Bash, WebFetch, WebSearch]
    description: Standard implementation, review, debugging
    prompt_prefix: null
    use_when:
      - Code changes, KB updates, refactoring
      - PR review analysis, comment drafting
      - Debugging, test writing
      - Skill execution requiring multi-step judgment

  verifier:
    model: sonnet
    effort: medium
    tools: [Read, Grep, Glob, Bash]
    description: Read-only reasoning pass for spec-vs-artifact or review-thread verification
    prompt_prefix: "This is an independent read-only verification pass. Do not edit files. Report outcomes faithfully: state a failed check as failed with the evidence, name any step you skipped, and do not soften or celebrate incomplete work. A pass is stated plainly; uncertainty is stated as uncertainty."
    use_when:
      - Verifying a diff against a task spec
      - Verifying review-thread replies and resolution safety
      - Scoring a design artifact against explicit criteria
      - Any judgment-heavy check that must be read-only

  architect:
    model: opus
    effort: high
    tools: ["*"]                       # unrestricted — architectural work may need anything
    description: Deep analysis, architecture, security, unfamiliar codebases
    prompt_prefix: null
    use_when:
      - Unfamiliar codebase deep exploration
      - Security review, threat modeling
      - Design decisions, architecture trade-offs
      - Complex cross-repo analysis
      - Tech debt audit

# Routing rules:
#   default: worker
#   Never use architect for something lookup can answer.
#   For lookup dispatches: always include prompt_prefix in the agent prompt.
#   When a workflow needs read-only judgment, prefer verifier over worker.
#   When uncertain between lookup and worker: prefer worker (reasoning > speed).
#   When uncertain between worker and architect: prefer worker unless the task
#     involves security, architecture decisions, or an unfamiliar codebase.
#
# Effort scaling (size reasoning to the task, not just the role):
#   Start from the role's `effort:`, then adjust by one tier on the low|medium|high
#   ladder before spawning. Do NOT change the model — effort and model move
#   independently (a haiku lookup can stay low; an opus design can drop to medium
#   for a mechanical sub-step).
#     - trivial / mechanical / answer-is-in-the-output  → drop one tier (floor: low)
#     - complex / ambiguous / multi-constraint / first attempt at a hard problem
#                                                       → raise one tier (cap: high)
#   Manual-only: this is a judgment the dispatcher applies per spawn. Never wire
#   an automated effort/model downgrade without a quality eval gate proving the
#   routing is correct (a cheaper misroute is silently wrong).
#
# Tool whitelist enforcement:
#   When spawning a subagent via Agent(), pass `tools=` matching the role's
#   `tools:` list. lookup and verifier MUST NOT receive Edit/Write — they are read-only roles.
#   Borrowed from affaan-m/ECC agent frontmatter pattern: explicit tools array
#   prevents role drift (lookup agent silently doing Write work).
#
# Default-model note (Claude Code 2.1.197, 2026-06-30):
#   Claude Sonnet 5 is now the Claude Code *default* model (native 1M-token context).
#   The roles above pin models explicitly, so lookup/worker/verifier/architect routing
#   is unaffected — but any UNPINNED path (a bare Agent() with no model=, plugin skills,
#   the native Explore agent) now resolves to Sonnet 5 instead of the previous default.
#   Do NOT silently promote Sonnet 5 to architect/verifier here on the strength of it
#   being the new default: run a quality eval first (see the Manual-only note above and
#   feedback_no-auto-model-downgrade-without-eval). The 1M-native window does not relax
#   the context-slicing stance — keep slicing before broad reads.
