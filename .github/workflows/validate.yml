name: Validate

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install tools
        run: |
          sudo apt-get install -y shellcheck python3 jq ripgrep p7zip-full
          go install github.com/rhysd/actionlint/cmd/actionlint@v1.7.12
          echo "$HOME/go/bin" >> "$GITHUB_PATH"

      - name: Full local validation gate
        run: bash tests/check-all.sh

      - name: Markdown internal-link check
        uses: lycheeverse/lychee-action@8646ba30535128ac92d33dfc9133794bfdd9b411 # v2
        with:
          # Pin lychee binary so flag compatibility (notably --include-fragments)
          # is reproducible across runs. Action prepends `lychee-` to this value
          # when constructing the release URL — provide bare `vX.Y.Z`.
          lycheeVersion: v0.15.1
          args: >-
            --offline
            --no-progress
            --include-fragments
            --exclude-path workspace
            --exclude-path .omc
            --exclude-path node_modules
            './**/*.md'
            '.claude/**/*.md'
          fail: true
