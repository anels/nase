name: Validate

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install tools
        run: |
          sudo apt-get install -y shellcheck python3

      - name: Bash syntax check
        run: |
          bash -n .claude/hooks/session-start.sh
          bash -n .claude/hooks/stop-todos.sh
          bash -n .claude/hooks/stop-backup.sh
          bash -n .claude/hooks/track-skill.sh
          bash -n .claude/hooks/worktree-log.sh

      - name: shellcheck
        run: |
          shellcheck -S warning .claude/hooks/session-start.sh
          shellcheck -S warning .claude/hooks/stop-todos.sh
          shellcheck -S warning .claude/hooks/stop-backup.sh
          shellcheck -S warning .claude/hooks/track-skill.sh
          shellcheck -S warning .claude/hooks/worktree-log.sh

      - name: JSON validation
        run: |
          python3 -m json.tool .claude/settings.json > /dev/null

      - name: Hook wiring check
        run: |
          grep -q "session-start.sh" .claude/settings.json || { echo "FAIL: session-start.sh not wired in settings.json"; exit 1; }
          grep -q "stop-todos.sh" .claude/settings.json     || { echo "FAIL: stop-todos.sh not wired in settings.json"; exit 1; }
          grep -q "stop-backup.sh" .claude/settings.json    || { echo "FAIL: stop-backup.sh not wired in settings.json"; exit 1; }
          grep -q "track-skill.sh" .claude/settings.json    || { echo "FAIL: track-skill.sh not wired in settings.json"; exit 1; }

      - name: Command inventory check
        run: |
          # Assert all commands listed in README exist as .md files
          MISSING=0
          while IFS= read -r cmd; do
            file=".claude/commands/nase/${cmd}.md"
            if [ ! -f "$file" ]; then
              echo "FAIL: README references /nase:${cmd} but ${file} does not exist"
              MISSING=1
            fi
          done < <(grep -oE '/nase:[a-z-]+' README.md | sed 's|/nase:||' | sort -u)
          [ "$MISSING" -eq 0 ] || exit 1

      - name: Skill bash syntax lint
        run: |
          FAIL=0
          for f in .claude/commands/nase/*.md; do
            if awk '/```bash/{p=1;next} /```/{p=0} p' "$f" | bash -n 2>/tmp/err; then
              :
            else
              echo "FAIL: invalid bash syntax in $f: $(cat /tmp/err)"
              FAIL=1
            fi
          done
          exit "$FAIL"
